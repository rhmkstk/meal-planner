<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#29b592">
    <title>Weakly Meal Planner - Offline</title>
    <style>
      :root {
        color: #222222;
        background: #fffaf4;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgb(41 181 146 / 0.10), transparent 28rem),
          linear-gradient(180deg, #fffaf4, #fffdfa);
      }

      main {
        width: min(100%, 420px);
        border: 1px solid #d5dfdb;
        border-radius: 12px;
        background: #fffdfa;
        padding: 28px;
        box-shadow: 0 18px 50px -32px rgb(41 37 31 / 0.45);
      }

      img {
        width: 56px;
        height: 56px;
        border-radius: 12px;
      }

      h1 {
        margin: 20px 0 8px;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #4e4e4e;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="">
      <h1>Baglanti yok</h1>
      <p>Weakly Meal Planner su anda internete ulasamiyor. Baglantiniz geri geldiginde sayfayi yenileyin.</p>
    </main>
  </body>
</html>
